version: 2
# cooldown delays scheduled version-update PRs by 7 days after a release (lets a
# bad release get yanked first). Security updates bypass cooldown, so patches for
# known vulnerabilities still open immediately.
updates:
  # Go modules.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions used in the workflows below.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  # The Dockerfile base image (golang:1.26-alpine).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
