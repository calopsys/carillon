name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # Pinned to match .golangci.yml (v1 schema) and the locally-verified
      # version. Put it on PATH so `make lint` finds it — CI runs the same
      # `make ci` as developers do.
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # `make ci` runs `go mod verify` + `go mod tidy -diff` (non-mutating tidiness
      # + integrity checks), so it never writes to the tree.
      - name: make ci
        run: make ci

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint Helm chart
        run: |
          helm lint deploy/helm/carillon
          helm template carillon deploy/helm/carillon > /dev/null

      # validate resolves the example config's secret refs, so provide dummies.
      - name: Validate example config
        run: |
          sudo mkdir -p /etc/carillon/creds
          printf x | sudo tee /etc/carillon/creds/gh_pat \
                               /etc/carillon/creds/mm_default_url \
                               /etc/carillon/creds/mm_security_url > /dev/null
          CARILLON_CRED_QUAY_RO=x ./bin/carillon validate -c docs/config.example.toml
