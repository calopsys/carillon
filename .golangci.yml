run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - bodyclose
    - nilerr
    - errorlint
    - gocritic
    - canonicalheader
    - copyloopvar
    - intrange
    - usetesting

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
