# Persistent Valkey for Carillon's high-water marks.
#
# Carillon stores one key per tracker (carillon:hwm:<name>) with NO TTL, so the
# data must survive restarts and must never be evicted — otherwise an evicted
# key re-baselines that tracker and re-notifies its current latest on the next
# run. AOF gives durable, replayable persistence; noeviction makes Valkey reject
# writes rather than silently drop our keys under memory pressure.

appendonly yes
appendfsync everysec
maxmemory-policy noeviction
save 900 1
save 300 10
dir /data
